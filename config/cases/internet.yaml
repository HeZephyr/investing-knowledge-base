hypothesis: Growth in Meta Family daily active people is sufficient to explain full-year revenue growth.
success: DAP and revenue have the same direction and their growth rates differ by no more than 5 percentage points.
failure: The growth gap exceeds 5 percentage points or ad impressions and price changes are material.
