name: CodeQL (manual)

on:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  packages: read

jobs:
  analyze:
    name: Analyze Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: python
      - uses: github/codeql-action/analyze@v4

# Private repositories may require GitHub Code Security. This workflow is manual
# so unavailable licensing never blocks ordinary CI.
