name: Free market calendar smoke tests

on:
  workflow_dispatch:
  schedule:
    # Monday and Thursday 06:40 Asia/Shanghai (GitHub cron uses UTC).
    - cron: "40 22 * * 0,3"

permissions:
  contents: read

concurrency:
  group: market-calendar-smoke
  cancel-in-progress: true

jobs:
  calendar:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install calendar adapter
        run: python -m pip install --upgrade pip && python -m pip install -e '.[data]'
      - name: Read global market sessions
        run: python -m investkb.market_calendar --smoke --markets XSHG,XHKG,XNYS,XLON
