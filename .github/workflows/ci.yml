name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Monday 06:20 Asia/Shanghai (GitHub cron uses UTC).
    - cron: "20 22 * * 0"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'
      - name: Ruff lint
        run: ruff check src tests
      - name: Ruff format
        run: ruff format --check src tests
      - name: Tests
        run: pytest -q

  knowledge-integrity:
    name: Raw and Wiki integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e '.[dev]'
      - run: python -m investkb.cli sources audit raw
      - run: python -m investkb.cli wiki lint

  offline-report:
    name: Offline backtest report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e '.[dev]'
      - run: python -m investkb.cli demo backtest --offline
      - run: test -s output/reports/demo/report.md && test -s output/reports/demo/equity.png
