name: Bug 报告
description: 报告代码、数据适配器、构建或网页交互问题
title: "fix: "
labels: [bug]
body:
  - type: textarea
    id: behavior
    attributes:
      label: 实际行为
    validations: {required: true}
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations: {required: true}
  - type: textarea
    id: reproduce
    attributes:
      label: 最小复现步骤
      render: shell
    validations: {required: true}
  - type: input
    id: environment
    attributes:
      label: 环境与版本
    validations: {required: true}
